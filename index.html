<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Voyages</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1b2a;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #counter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e6091;
      padding: 0.5rem 1.1rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 600;
    }

    #counter span { font-size: 1.4rem; font-weight: 800; }

    #map-container {
      width: 100%;
      max-width: 1200px;
      padding: 1.5rem 1rem;
      flex: 1;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .country {
      stroke: #1a3a5c;
      stroke-width: 0.4px;
      cursor: pointer;
      transition: fill 0.15s ease;
    }

    .country.unvisited { fill: #2a4a6a; }
    .country.visited   { fill: #28a745; }

    .country:hover.unvisited { fill: #3a6a9a; }
    .country:hover.visited   { fill: #20c052; }

    #graticule {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 0.4px;
    }

    #sphere { fill: #091524; }

    #tooltip {
      position: fixed;
      background: rgba(10, 25, 45, 0.92);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e8f4f8;
      padding: 0.45rem 0.9rem;
      border-radius: 0.4rem;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 10;
      white-space: nowrap;
    }

    #legend {
      display: flex;
      gap: 1.5rem;
      padding: 0 1rem 1.2rem;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .legend-item { display: flex; align-items: center; gap: 0.45rem; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 3px;
    }
    .legend-dot.unvisited { background: #2a4a6a; border: 1px solid #3a6a9a; }
    .legend-dot.visited   { background: #28a745; }
  </style>
</head>
<body>

<header>
  <h1>🌍 Mes Voyages</h1>
  <div id="counter"><span id="count">0</span> pays visité(s)</div>
</header>

<div id="map-container">
  <svg id="map" viewBox="0 0 960 500"></svg>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot unvisited"></div> Non visité</div>
  <div class="legend-item"><div class="legend-dot visited"></div> Visité — cliquez pour basculer</div>
</div>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const STORAGE_KEY = 'visited_countries';

function loadVisited() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); }
  catch { return new Set(); }
}

function saveVisited(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}

let visited = loadVisited();

const svg = d3.select('#map');
const tooltip = document.getElementById('tooltip');
const countEl = document.getElementById('count');

const projection = d3.geoNaturalEarth1()
  .scale(153)
  .translate([480, 250]);

const path = d3.geoPath().projection(projection);

svg.append('path')
  .datum({ type: 'Sphere' })
  .attr('id', 'sphere')
  .attr('d', path);

svg.append('path')
  .datum(d3.geoGraticule()())
  .attr('id', 'graticule')
  .attr('d', path);

const g = svg.append('g');

function updateCount() {
  countEl.textContent = visited.size;
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);

    // ISO numeric → name lookup using d3 built-in (via a small embedded map)
    const names = getCountryNames();

    g.selectAll('.country')
      .data(countries.features)
      .join('path')
      .attr('class', d => `country ${visited.has(d.id) ? 'visited' : 'unvisited'}`)
      .attr('d', path)
      .on('mousemove', (event, d) => {
        const name = names[d.id] || `Pays #${d.id}`;
        tooltip.style.opacity = '1';
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 28) + 'px';
        tooltip.textContent = name + (visited.has(d.id) ? ' ✓' : '');
      })
      .on('mouseleave', () => { tooltip.style.opacity = '0'; })
      .on('click', (event, d) => {
        if (visited.has(d.id)) {
          visited.delete(d.id);
          d3.select(event.currentTarget).attr('class', 'country unvisited');
        } else {
          visited.add(d.id);
          d3.select(event.currentTarget).attr('class', 'country visited');
        }
        saveVisited(visited);
        updateCount();
      });

    updateCount();
  });
